spring:
  application:
    name: zhihuitushu

  datasource:
    url: jdbc:mysql://119.27.181.33:3306/zhihuitushu?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: Root@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # QQ 邮箱 SMTP 配置
  # 请替换 username 为真实 QQ 邮箱地址，password 为 QQ 邮箱 SMTP 授权码（非登录密码）
  # 生产环境建议通过环境变量 ${MAIL_USERNAME} / ${MAIL_PASSWORD} 注入
  mail:
    host: smtp.qq.com
    port: 465
    username: your_qq_email@qq.com
    password: your_qq_authorization_code
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.starttls.enable: false
      mail.smtp.socketFactory.port: 465
      mail.smtp.socketFactory.class: javax.net.ssl.SSLSocketFactory

  cors:
    allowed-origins: http://localhost:5173
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: '*'
    allow-credentials: true

server:
  port: 8765

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

cos:
  secret-id: your-secret-id
  secret-key: your-secret-key
  region: ap-guangzhou
  bucket-name: your-bucket-name
  base-url: https://your-bucket-name.cos.ap-guangzhou.myqcloud.com

jwt:
  secret: zhihuitushu-secret-key-256-bit-minimum-length-for-security-2024
  expire-minutes: 120
  remember-me-expire-days: 7
