spring.application.name=zhihuitushu

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/zhihuitushu?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.cache-enabled=false
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=auto

cos.secret-id=your-secret-id
cos.secret-key=your-secret-key
cos.region=ap-guangzhou
cos.bucket-name=your-bucket-name
cos.base-url=https://your-bucket-name.cos.ap-guangzhou.myqcloud.com

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

spring.cors.allowed-origins=http://localhost:5173
spring.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cors.allowed-headers=*
spring.cors.allow-credentials=true

jwt.secret=zhihuitushu-secret-key-256-bit-minimum-length-for-security-2024
jwt.expire-minutes=120
jwt.remember-me-expire-days=7